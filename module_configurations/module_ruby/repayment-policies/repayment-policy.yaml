apiVersion: rrsd.zetaapps.in/v1alpha1
kind: RubyRepaymentPolicy
metadata:
  name: lsg.ruby.rubyrepaymentpolicy.5001
spec:
  metadata:
    id: ruby.rubyrepaymentpolicy.5001
    name: 5001 Ruby Repayment Policy - Bank Xee Subprime Optimized
    description: Optimized for US Subprime Rebuilders - Principal and Interest prioritization to minimize debt snowball.
    requester:
      module: ruby-module-e2e
      moduleVersion: 0.0.1
    tenantId: '600309'
    tenantCode: lsg
  name: Ruby Repayment Policy
  code: REPUS005001
  description: Subprime optimized repayment logic prioritizing interest-bearing balances.
  repaymentAllocation:
    aboveMAD:
      allocationModel: HIGHESTTOLOWESTAPR
      allocationTieBreaker: REPAYMENTSEQUENCE
      repaymentSequence:
        - chargeOffStatuses:
            - '*'
          repaymentSequenceTieBreaker: FIFO
          settlementPriority:
            # PROPOSED CHANGE: Kill interest-bearing principal first to stop the daily interest accrual
            - RetailPrincipalBilled
            - CashPrincipalBilled
            - RetailPrincipalUnbilled
            - CashPrincipalUnbilled
            # SECONDARY: Clear the actual cost of interest
            - CashInterestBilled
            - CashInterestUnbilled
            - RetailInterestBilled
            - RetailInterestUnbilled
            # TERTIARY: Clear non-interest bearing fees last
            - LateFeeBilled
            - LateFeeUnbilled
            - AnnualFeeBilled
            - AnnualFeeUnbilled
            - CashAdvanceFeeBilled
            - CashAdvanceFeeUnbilled
            - InsufficientFundFeeBilled
            - InsufficientFundFeeUnbilled
            - RetailServiceFeeBilled
            - RetailServiceFeeUnbilled
            - RetailMiscFeeBilled
            - RetailMiscFeeUnbilled
    belowMAD:
      allocationModel: LOWESTTOHIGHESTAPR
      allocationTieBreaker: REPAYMENTSEQUENCE
      repaymentSequence:
        - chargeOffStatuses:
            - '*'
          repaymentSequenceTieBreaker: FIFO
          settlementPriority:
            # PROPOSED CHANGE: Prioritize Interest over Fees to keep the account "Current" and clear current debt costs
            - RetailInterestBilled
            - RetailInterestUnbilled
            - CashInterestBilled
            - CashInterestUnbilled
            # Standard Fee Priorities
            - CashAdvanceFeeBilled
            - CashAdvanceFeeUnbilled
            - LateFeeBilled
            - LateFeeUnbilled
            - AnnualFeeBilled
            - AnnualFeeUnbilled
            - InsufficientFundFeeBilled
            - InsufficientFundFeeUnbilled
            - RetailServiceFeeBilled
            - RetailServiceFeeUnbilled
            - RetailMiscFeeBilled
            - RetailMiscFeeUnbilled
            # Principal stays at the bottom of the "Below MAD" logic as per standard US regulatory practice
            - RetailPrincipalBilled
            - RetailPrincipalUnbilled
            - CashPrincipalBilled
            - CashPrincipalUnbilled
  otherCreditAllocation:
    allocationModel: HIGHESTTOLOWESTAPR
    allocationTieBreaker: REPAYMENTSEQUENCE
    repaymentSequence:
      - chargeOffStatuses:
          - '*'
        repaymentSequenceTieBreaker: FIFO
        settlementPriority:
          - CashAdvanceFeeBilled
          - CashAdvanceFeeUnbilled
          - LateFeeBilled
          - LateFeeUnbilled
          - RetailMiscFeeBilled
          - RetailMiscFeeUnbilled
          - AnnualFeeBilled
          - AnnualFeeUnbilled
          - InsufficientFundFeeBilled
          - InsufficientFundFeeUnbilled
          - RetailServiceFeeBilled
          - RetailServiceFeeUnbilled
          - RetailInterestBilled
          - RetailInterestUnbilled
          - CashInterestBilled
          - CashInterestUnbilled
          - RetailPrincipalBilled
          - RetailPrincipalUnbilled
          - CashPrincipalBilled
          - CashPrincipalUnbilled
  repaymentReversal:
    # PROPOSED CHANGE: Excess goes to Cash to shield against the highest potential APR charges
    excessAttributionPostingCategory: CashPrincipalUnbilled
    lateFeeAdjustment: true
    interestAdjustment: true
  validFrom: '2000-01-01T00:00:00.000-05:00'
  validTill: '2999-01-01T00:00:00.000-05:00'
  templateCode: us-credit