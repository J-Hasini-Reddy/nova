WithAttrbution; }; var addMadComponentsToComputeCurrentMAD = function(madComponents) { var currMADFromCategories = 0; for (var postingCategory in postingCategoryMadComponentsDefaultAttribution) { currMADFromCategories += madComponents[postingCategory]; } currMADFromCategories = applyRounding(currMADFromCategories, getModelParam('roundingForCurrentDue')); return currMADFromCategories; }; var madComponents = getMADComponentsForCategories(); var previousminimumamountdue = 1 * (args.postingcategories.minimumamountdue); var minMAD = getMinimumCurrMAD(); var unpaidLateFeesFromPreviousBillingPeriod = getUnpaidLateFeesFromPreviousBillingPeriod(args.activecouponspercategory['latefeebilled'], args.previousbillingsummary); var applicableMadProgram = getApplicableMadProgram(); if (isNotNull(applicableMadProgram)) { var madComponentsOverride = applicableMadProgram.madComponentsOverride; for (var name in madComponentsOverride) { if (madComponentsOverride.hasOwnProperty(name) && isNotNull(args.postingcategories[name])) { madComponents[name] = madComponentsOverride[name] * args.postingcategories[name]; } } if (!applicableMadProgram.flags['minMADApplicable']) { minMAD = 0; } if (applicableMadProgram.flags['skipLateFeeHandlingForPrevCycle']) { unpaidLateFeesFromPreviousBillingPeriod = 0; } } var currMADFromCategories = addMadComponentsToComputeCurrentMAD(madComponents); var currMADConsideringMinMAD = Math.max(currMADFromCategories, minMAD); var finalCurrMAD = currMADConsideringMinMAD - unpaidLateFeesFromPreviousBillingPeriod; if (args.currentbalance < 0) { finalCurrMAD = 0; } var totalMAD = finalCurrMAD + previousminimumamountdue; if (totalMAD >= args.currentbalance) { finalCurrMAD = Math.max(finalCurrMAD - totalMAD + args.currentbalance, 0); totalMAD = finalCurrMAD + previousminimumamountdue; } var finalTotalMAD = Math.max(Math.min(totalMAD, args.currentbalance), getMinimumTotalMAD()); madComponents['previouscycleunpaidlatefee'] = unpaidLateFeesFromPreviousBillingPeriod; madComponen