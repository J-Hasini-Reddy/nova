apiVersion: rrsd.zetaapps.in/v1alpha1
kind: RubyAccountSetupFeePolicy
metadata:
  name: lsg.ruby.rubyaccountsetupfeepolicy.1001
spec:
  metadata:
    id: ruby.rubyaccountsetupfeepolicy.1001
    name: 1001 Account Setup Fee Policy
    description: Account Setup Fee Policy for US subprime credit card launch
    requester:
      module: ruby-module-e2e
      moduleVersion: 0.0.1
    tenantId: '600309'
    tenantCode: lsg
  name: US Subprime Account Setup Fee Policy
  code: ASFUS001001
  description: Fixed account setup fee for US subprime credit card customers
  modelParameters:
    fixedAmount:
      baseFee:
        amount: 25
        currency: USD
    chargeStrategy: DIRECT-APPLY
    chargeStrategyConfig:
      application:
        applyOn: keyDateSpecification://code/ACCOUNT_OPEN_DATE
        voucherCode: ACCOUNT_SETUP_FEE
        offsetDaysForValueDate: '0'
  validFrom: '2026-03-22T00:00:00.000+05:30'
  validTill: '9999-01-01T00:00:00.000+05:30'
  templateCode: us-credit-subprime
