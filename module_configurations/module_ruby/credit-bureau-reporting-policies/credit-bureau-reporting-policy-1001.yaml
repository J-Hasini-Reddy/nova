apiVersion: rrsd.zetaapps.in/v1alpha1
kind: RubyCreditBureauReportingPolicy
metadata:
  name: lsg.ruby.rubycreditbureaureportingpolicy.1001
spec:
  metadata:
    id: ruby.rubycreditbureaureportingpolicy.1001
    name: 1001 Ruby Credit Bureau Reporting Policy
    description: 1001 Ruby Credit Bureau Reporting Policy
    requester:
      module: ruby-module-e2e
      moduleVersion: 0.0.1
    tenantId: '600309'
    tenantCode: lsg
  name: Ruby Credit Bureau Reporting Policy
  code: CBRUS001001
  description: Ruby Credit Bureau Reporting Policy
  provider: ruby
  reportToCreditBureau: true
  frequencyOfReporting: CYCLEBASED
  restrictedStatusesForBureauReporting:
    - tag://tradeline/LEVEL_0
    - tag://accountBlockStatus/LEVEL_2
    - tag://accountLifecycleStatus/LEVEL_4
    - tag://accountLifecycleStatus/LEVEL_5
    - tag://accountLifecycleStatus/LEVEL_6
  accountClosureReporting:
    status: CLOSED
  immediateReportNewOpenedAccount: true
  addressPreference:
    - permanent
    - residence
    - default
  immediateReportingForTerminalStatus:
    - tagUri: tag://autoChargeOffStatus/LEVEL_0
      applicableField: finalChargeOffDate
      source: account
    - tagUri: tag://manualChargeOffStatus/LEVEL_0
      applicableField: effectiveFrom
      source: account
  associatedConsumerReporting:
    relationshipTypes:
      - ALL
      - SPOUSE
  validFrom: '2000-01-01T23:09:01.795+07:00'
  validTill: '2999-01-01T23:09:01.795+07:00'
  templateCode: us-credit
