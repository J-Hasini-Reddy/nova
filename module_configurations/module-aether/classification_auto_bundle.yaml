  classificationFunction: "function classificationUnits(object) {    var accountEntityType = 'Account';    var accountHolderEntityType = 'AccountHolder';    var cardEntityType = 'Card';    var deletedCardStatusType = 'DELETED';    var unclassifiedUnitCode = 'UNCLASSIFIED';    var policy = getPolicy();    if (!object.hasOwnProperty('entityStatuses')) {        return {};    }    var entityStatuses = object.entityStatuses;    var previousBundleStatus = validatePreviousBundleStatus(object.previousBundleStatus);    return determineClassificationUnitCode(entityStatuses, previousBundleStatus);    function determineClassificationUnitCode(entityStatuses, previousBundleStatus) {        var classificationUnitCode = [];        var resolvedBundleStatusDetail = getResolvedBundleStatusDetail(entityStatuses);        if (resolvedBundleStatusDetail.resultantBundleStatusDetail.bundleStatus === '{}') {            return {};        }        if ((!resolvedBundleStatusDetail.resultantBundleStatusDetail.bundleStatus || resolvedBundleStatusDetail.resultantBundleStatusDetail.bundleStatus === unclassifiedUnitCode) && !(previousBundleStatus && previousBundleStatus.isPermanent === true)) {            classificationUnitCode.push(unclassifiedUnitCode);            return classificationUnitCode;        }        var resolvedBundleStatusPermanentStatus = resolvedBundleStatusDetail.isPermanent;        if (previousBundleStatus) {            if (previousBundleStatus.isPermanent) {                if (resolvedBundleStatusPermanentStatus) {                    result = comparePriority(resolvedBundleStatusDetail.resultantBundleStatusDetail, previousBundleStatus);                    classificationUnitCode.push(result.bundleStatus);                } else {                    classificationUnitCode.push(previousBundleStatus.bundleStatus);                }            } else {                if (resolvedBundleStatusPermanentStatus) {                    classificationUnitCode.push(resolvedBundleStatusDetail.resultantBundleStatusDetail.bundleStatus);                } else {                    result = comparePriority(resolvedBundleStatusDetail.resultantBundleStatusDetail, previousBundleStatus);                    classificationUnitCode.push(result.bundleStatus);                }            }        } else {            classificationUnitCode.push(resolvedBundleStatusDetail.resultantBundleStatusDetail.bundleStatus);        }        return classificationUnitCode;    }    function comparePriority(firstBundleStatus, secondBundleStatus) {        if (firstBundleStatus.priority >= secondBundleStatus.priority) {            return firstBundleStatus;        } else {            return secondBundleStatus;        }    }    function validateEntityStatusesInput(entityStatus) {        return (entityStatus.hasOwnProperty('entityType') && entityStatus.hasOwnProperty('statusType') && entityStatus.hasOwnProperty('statusValue'));    }    var result;    function validatePreviousBundleStatus(previousBundleStatus) {        if (previousBundleStatus && previousBundleStatus.hasOwnProperty('bundleStatus') && previousBundleStatus.hasOwnProperty('isPermanent') && previousBundleStatus.hasOwnProperty('priority')) {            return previousBundleStatus;        }        return null;    }    function getResolvedBundleStatusDetail(entityStatuses) {        var resultantBundleStatusDetail = {};        var maxPriorityPermanentStatus = false;        for (var i = 0; i < entityStatuses.length; i++) {            var entityStatus = entityStatuses[i];            var isValidInput = validateEntityStatusesInput(entityStatus);            if (!isValidInput) {                return {                    resultantBundleStatusDetail: {                        bundleStatus: '{}'                    },                    isPermanent: false                };            }            if (entityStatus.entityType === cardEntityType && entityStatus.statusType === deletedCardStatusType) {                continue;            }            var resolvedBundleStatusFromPolicy = resolveBundleStatusFromPolicy(entityStatus);            if (Object.keys(resolvedBundleStatusFromPolicy).length === 0 || !resolvedBundleStatusFromPolicy.hasOwnProperty('bundleStatus')) {                continue;            }            if (!resultantBundleStatusDetail.hasOwnProperty('bundleStatus') || resolvedBundleStatusFromPolicy.priority > resultantBundleStatusDetail.priority) {                resultantBundleStatusDetail = resolvedBundleStatusFromPolicy;                maxPriorityPermanentStatus = resolvedBundleStatusFromPolicy.isPermanent;            }        }        return {            resultantBundleStatusDetail: resultantBundleStatusDetail,            isPermanent: maxPriorityPermanentStatus        };    }    function resolveBundleStatusFromPolicy(entityStatus) {        function entityTypeFilterFunction(value) {            return value.entityType === entityStatus.entityType;        }        function statusTypeFilterFunction(value) {            return value.statusType === entityStatus.statusType;        }        function statusValueFilterFunction(value) {            return value.statusValue === entityStatus.statusValue;        }        var entityTypeFilteredResult = policy.filter(entityTypeFilterFunction);        if (entityTypeFilteredResult.length === 0 || entityTypeFilteredResult.length > 1) {            return {};        }        var statusMatrixArray = entityTypeFilteredResult[0].statusMatrix;        var statusTypeFilteredResult = statusMatrixArray.filter(statusTypeFilterFunction);        if (statusTypeFilteredResult.length === 0 || statusTypeFilteredResult.length > 1) {            return {};        }        var statusValueArray = statusTypeFilteredResult[0].statusValues;        var statusValueFilteredResult = statusValueArray.filter(statusValueFilterFunction);        if (statusValueFilteredResult.length === 0 || statusValueFilteredResult.length > 1) {            return {};        }        return statusValueFilteredResult[0];    }    function getPolicy() {        var policy = [{            entityType: accountEntityType,            statusMatrix: [{                statusType: 'delinquencyStatus',                statusValues: [{                    statusValue: 'LEVEL_2',                    bundleStatus: 'ABDE1',                    priority: 91,                    isPermanent: false                }, {                    statusValue: 'LEVEL_3',                    bundleStatus: 'ABDE2',                    priority: 92,                    isPermanent: false                }, {                    statusValue: 'LEVEL_4',                    bundleStatus: 'ABDE3',                    priority: 93,                    isPermanent: false                }, {                    statusValue: 'LEVEL_5',                    bundleStatus: 'ABDE4',                    priority: 94,                    isPermanent: false                }, {                    statusValue: 'LEVEL_6',                    bundleStatus: 'ABDE5',                    priority: 95,                    isPermanent: false                }, {                    statusValue: 'LEVEL_7',                    bundleStatus: 'ABDE6',                    priority: 96,                    isPermanent: false                }, {                    statusValue: 'LEVEL_8',                    bundleStatus: 'ABDE7',                    priority: 97,                    isPermanent: false                }, {                    statusValue: 'LEVEL_9',                    bundleStatus: 'ABDE8',                    priority: 98,                    isPermanent: false                }],            }, {                statusType: 'autoChargeOffStatus',                statusValues: [{                    statusValue: 'LEVEL_1',                    bundleStatus: 'ABCO1',                    priority: 99,                    isPermanent: false                }, {                    statusValue: 'LEVEL_2',                    bundleStatus: 'ABCO2',                    priority: 100,                    isPermanent: false                }],            }, {                statusType: 'autoDefaultStatus',                statusValues: [{                    statusValue: 'LEVEL_1',                    bundleStatus: 'ABDS1',                    priority: 101,                    isPermanent: false                }, {                    statusValue: 'LEVEL_2',                    bundleStatus: 'ABDS2',                    priority: 102,                    isPermanent: false                }],{statusValue: 'LEVEL_1',bundleStatus: 'ABGP1',priority: 90,isPermanent: false},            }]        }];        return policy;    }}"
